services:
  db:
    image: postgres:16-alpine
    container_name: homelab-dashboard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homelab}
      POSTGRES_DB: ${POSTGRES_DB:-homelab_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homelab} -d ${POSTGRES_DB:-homelab_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
